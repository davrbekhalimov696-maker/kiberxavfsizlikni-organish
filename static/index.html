<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>CyberZone Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>CYBER ZONE</h2>
        <button onclick="loadModule('kirish')">Kirish</button>
        <button onclick="loadModule('kripto')">Kriptografiya</button>
    </div>

    <div class="main-content">
        <h1 id="module-title">Modulni tanlang</h1>
        <iframe id="video-frame" class="video-player" src="" frameborder="0" allowfullscreen></iframe>
        <div id="theory-text">Nazariya qismi...</div>

        <div class="terminal-box">
            <div id="ai-response">Mentor: Savol bering...</div>
            <input type="text" id="user-input" onkeypress="if(event.key==='Enter') askMentor()">
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
